server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # App shell + service worker + manifest must revalidate so PWA updates land
    # (never serve a stale shell that points at old hashed assets).
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /sw.js {
        default_type application/javascript;
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    # SPA history fallback: unknown routes serve the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed Vite assets are immutable — cache aggressively. `^~` stops the
    # image regex below from overriding this for /assets/*.png.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Favicons / PWA icons at the site root rarely change — cache for a month.
    location ~* \.(?:png|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
